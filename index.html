<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobDeveloperCup - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Spicy+Rice&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1a1a;
            background-image: linear-gradient(90deg, #151515 50%, #1a1a1a 50%);
            background-size: 60px 100%;
            color: #ffffff;
            font-family: 'Spicy Rice', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .main-layout {
            display: flex;
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            gap: 40px;
            align-items: center;
        }

        .left-panel {
            flex: 1;
            background-color: #0b0b0b;
            border: 6px solid #ffffff;
            border-radius: 12px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            box-shadow: 0px 12px 0px #000000;
            width: 100%;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            pointer-events: none;
            border-radius: 6px;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .header {
            margin-bottom: 40px;
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .header h1 {
            font-family: 'Bangers', cursive, sans-serif;
            font-size: clamp(2rem, 8vw, 3.4rem);
            color: #ffffff;
            line-height: 1.0;
            text-shadow: 4px 4px 0px #000000;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 340px;
            position: relative;
            z-index: 2;
        }

        .card-link {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 18px 25px;
            border: 5px solid #000000;
            border-radius: 8px;
            box-shadow: 0px 6px 0px #000000;
            transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.1s ease, color 0.1s ease;
        }

        .card-link i {
            font-size: 2rem;
            width: 45px;
            text-align: center;
            margin-right: 12px;
            color: #000000;
            transition: color 0.1s ease;
        }

        .card-link span {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (hover: hover) {
            .card-link:hover {
                transform: translateY(-4px);
                box-shadow: 0px 10px 0px #ffffff;
                background-color: #000000;
                color: #ffffff;
                border-color: #ffffff;
            }
            .card-link:hover i {
                color: #ffffff;
            }
        }

        .card-link:active {
            transform: translateY(4px);
            box-shadow: 0px 2px 0px #000000;
        }

        .showcase-container {
            display: flex;
            flex-direction: column;
            gap: 35px;
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 2;
        }

        .game-showcase {
            display: block;
            text-decoration: none;
            color: #ffffff;
            border: 6px solid #ffffff;
            border-radius: 8px;
            background-color: #000000;
            box-shadow: 0px 10px 0px #000000;
            overflow: hidden;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        @media (hover: hover) {
            .game-showcase:hover {
                transform: translateY(-4px);
                box-shadow: 0px 14px 0px #ffffff;
            }
            .game-showcase:hover img {
                filter: grayscale(100%) contrast(140%) brightness(110%);
            }
        }

        .game-showcase:active {
            transform: translateY(4px);
            box-shadow: 0px 4px 0px #000000;
        }

        .game-showcase img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) contrast(130%) brightness(90%);
            border-bottom: 6px solid #ffffff;
            transition: filter 0.2s ease;
        }

        .game-info {
            padding: 20px;
            background-color: #0b0b0b;
        }

        .game-title {
            font-size: 1.8rem;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .platform-badge {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 5px 14px;
            font-size: 0.95rem;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 2px solid #000000;
        }

        .credits {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #888888;
            text-transform: uppercase;
            border-top: 2px dashed #222222;
            padding-top: 8px;
        }

        .footer {
            background-color: #0b0b0b;
            border-top: 8px double #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 1rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
        }

        @media (max-width: 950px) {
            body {
                background-image: none;
            }
            .main-layout {
                flex-direction: column;
                padding: 30px 15px;
                gap: 30px;
            }
            .left-panel {
                padding: 40px 20px;
                max-width: 460px;
            }
            .card-link span {
                font-size: 1.3rem;
            }
            .game-title {
                font-size: 1.6rem;
            }
            .game-showcase img {
                height: 180px;
            }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <aside class="left-panel">
            <div class="header">
                <h1>BOBDEVELOPERCUP</h1>
            </div>

            <nav class="links-list">
                <a href="https://bob-developer.itch.io/" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Itch.io">
                    <i class="fab fa-itch-io" aria-hidden="true"></i>
                    <span>Itch.io</span>
                </a>

                <a href="https://discord.com/invite/SHhxwhBCjw" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Servidor do Discord">
                    <i class="fab fa-discord" aria-hidden="true"></i>
                    <span>Discord</span>
                </a>

                <a href="https://www.youtube.com/@BobDevelopercup" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Canal do YouTube">
                    <i class="fab fa-youtube" aria-hidden="true"></i>
                    <span>YouTube</span>
                </a>
            </nav>
        </aside>

        <main class="right-panel">
            <div class="showcase-container">
                <a href="https://discord.com/invite/SHhxwhBCjw" target="_blank" rel="noopener" class="game-showcase" aria-label="Ver detalhes do jogo Cuphead B2B">
                    <img src="CupheadB2B_Banner.png" alt="Banner do jogo Cuphead B2B" loading="lazy">
                    <div class="game-info">
                        <div class="game-title">Cuphead B2B</div>
                        <div class="platform-badge">Compatibilidade: Mobile / PC</div>
                    </div>
                </a>

                <a href="https://bob-developer.itch.io/brothers-in-arms-bob" target="_blank" rel="noopener" class="game-showcase" aria-label="Ver detalhes do jogo Brothers In Arms">
                    <img src="BrohtersInarms_Banner.png" alt="Banner do jogo Brothers In Arms" loading="lazy">
                    <div class="game-info">
                        <div class="game-title">Brothers In Arms</div>
                        <div class="platform-badge">Aviso: Para PC</div>
                        <div class="credits">
                            Todos os sprites da primeira fase são do GabeDeveloper!
                        </div>
                    </div>
                </a>
            </div>
        </main>
    </div>

    <footer class="footer">
        © 2026 BobDeveloperCup
    </footer>

</body>
</html>
