<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobDeveloperCup - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Spicy+Rice&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1a1a;
            background-image: 
                radial-gradient(circle, transparent 30%, rgba(0,0,0,0.7) 100%),
                linear-gradient(45deg, #151515 25%, transparent 25%, transparent 75%, #151515 75%, #151515),
                linear-gradient(45deg, #151515 25%, #1a1a1a 25%, #1a1a1a 75%, #151515 75%, #151515);
            background-size: 100% 100%, 60px 60px, 60px 60px;
            background-position: 0 0, 0 0, 30px 30px;
            color: #ffffff;
            font-family: 'Spicy Rice', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow-x: hidden;
            animation: moverListras 3s linear infinite;
        }

        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
            animation: graoFilme 0.3s steps(4) infinite;
        }

        @keyframes moverListras {
            0% {
                background-position: 0 0, 0 0, 30px 30px;
            }
            100% {
                background-position: 0 0, 60px 60px, 90px 90px;
            }
        }

        @keyframes graoFilme {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            20% { transform: translate(-2%, 1%); }
            30% { transform: translate(1%, -2%); }
            40% { transform: translate(-1%, 3%); }
            50% { transform: translate(-2%, 1%); }
            60% { transform: translate(1%, 2%); }
            70% { transform: translate(3%, -2%); }
            80% { transform: translate(-1%, 1%); }
            90% { transform: translate(2%, -1%); }
            100% { transform: translate(1%, 1%); }
        }

        .main-layout {
            display: flex;
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            gap: 40px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .profile-panel {
            flex: 1;
            background-color: #0b0b0b;
            border: 6px solid #ffffff;
            border-radius: 12px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            box-shadow: 0px 12px 0px #000000;
            width: 100%;
        }

        .profile-panel::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            pointer-events: none;
            border-radius: 6px;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .header {
            margin-bottom: 40px;
            position: relative;
            width: 100%;
            overflow: visible;
        }

        .header h1 {
            font-family: 'Bangers', cursive, sans-serif;
            font-size: clamp(2rem, 8vw, 3.4rem);
            color: #ffffff;
            line-height: 1.0;
            text-shadow: 4px 4px 0px #000000;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header h1:hover {
            transform: scale(1.08);
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 340px;
            position: relative;
            z-index: 2;
        }

        .card-link {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 18px 25px;
            border: 5px solid #000000;
            border-radius: 8px;
            box-shadow: 0px 6px 0px #000000;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s ease, background-color 0.15s ease, color 0.15s ease;
        }

        .card-link i {
            font-size: 2rem;
            width: 45px;
            text-align: center;
            margin-right: 12px;
            color: #000000;
            transition: color 0.15s ease;
        }

        .card-link span {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (hover: hover) {
            .card-link:hover {
                transform: translateY(-4px) scale(1.02);
                box-shadow: 0px 10px 0px #ffffff, 0px 10px 20px rgba(255, 255, 255, 0.2);
                background-color: #000000;
                color: #ffffff;
                border-color: #ffffff;
            }
            .card-link:hover i {
                color: #ffffff;
            }
        }

        .card-link:active {
            transform: translateY(4px);
            box-shadow: 0px 2px 0px #000000;
        }

        .showcase-container {
            display: flex;
            flex-direction: column;
            gap: 35px;
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 2;
        }

        .game-showcase {
            display: block;
            text-decoration: none;
            color: #ffffff;
            border: 6px solid #ffffff;
            border-radius: 8px;
            background-color: #000000;
            box-shadow: 0px 10px 0px #000000;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s ease;
        }

        @media (hover: hover) {
            .game-showcase:hover {
                transform: translateY(-6px) rotate(-1.5deg) scale(1.01);
                box-shadow: 0px 16px 0px #ffffff;
            }
            .game-showcase:hover img {
                filter: grayscale(100%) contrast(140%) brightness(110%);
            }
        }

        .game-showcase:active {
            transform: translateY(4px);
            box-shadow: 0px 4px 0px #000000;
        }

        .game-showcase img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) contrast(130%) brightness(90%);
            border-bottom: 6px solid #ffffff;
            transition: filter 0.2s ease;
        }

        .game-info {
            padding: 20px;
            background-color: #0b0b0b;
        }

        .game-title {
            font-size: 1.8rem;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .platform-badge {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 5px 14px;
            font-size: 0.95rem;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 2px solid #000000;
        }

        .credits {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #888888;
            text-transform: uppercase;
            border-top: 2px dashed #222222;
            padding-top: 8px;
        }

        .footer {
            background-color: #0b0b0b;
            border-top: 8px double #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 1rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        @media (max-width: 950px) {
            .main-layout {
                flex-direction: column;
                padding: 30px 15px;
                gap: 30px;
            }
            .profile-panel {
                padding: 40px 20px;
                max-width: 460px;
            }
            .card-link span {
                font-size: 1.3rem;
            }
            .game-title {
                font-size: 1.6rem;
            }
            .game-showcase img {
                height: 180px;
            }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <section class="profile-panel">
            <header class="header">
                <h1>BOBDEVELOPERCUP</h1>
            </header>

            <nav class="links-list">
                <a href="https://www.youtube.com/@BobDevelopercup" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Canal do YouTube">
                    <i class="fab fa-youtube" aria-hidden="true"></i>
                    <span>YouTube</span>
                </a>

                <a href="https://discord.com/invite/SHhxwhBCjw" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Servidor do Discord">
                    <i class="fab fa-discord" aria-hidden="true"></i>
                    <span>Discord</span>
                </a>

                <a href="https://bob-developer.itch.io/" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Itch.io">
                    <i class="fab fa-itch-io" aria-hidden="true"></i>
                    <span>Itch.io</span>
                </a>

                <a href="https://www.tiktok.com/@bobdevelopercup" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Perfil do TikTok">
                    <i class="fab fa-tiktok" aria-hidden="true"></i>
                    <span>TikTok</span>
                </a>
            </nav>
        </section>

        <main class="right-panel">
            <section class="showcase-container">
                <a href="https://discord.com/invite/SHhxwhBCjw" target="_blank" rel="noopener" class="game-showcase" aria-label="Ver detalhes do jogo Cuphead B2B">
                    <img src="CupheadB2B_Banner.png" alt="Banner do jogo Cuphead B2B" loading="lazy">
                    <div class="game-info">
                        <h2 class="game-title">Cuphead B2B</h2>
                        <span class="platform-badge">Compatibilidade: Mobile / PC</span>
                    </div>
                </a>

                <a href="https://bob-developer.itch.io/brothers-in-arms-bob" target="_blank" rel="noopener" class="game-showcase" aria-label="Ver detalhes do jogo Brothers In Arms">
                    <img src="BrohtersInarms_Banner.png" alt="Banner do jogo Brothers In Arms" loading="lazy">
                    <div class="game-info">
                        <h2 class="game-title">Brothers In Arms</h2>
                        <span class="platform-badge">Aviso: Para PC</span>
                        <p class="credits">
                            Todos os sprites da primeira fase são do GabeDeveloper!
                        </p>
                    </div>
                </a>
            </section>
        </main>
    </div>

    <footer class="footer">
        © 2026 BobDeveloperCup
    </footer>

</body>
</html>
