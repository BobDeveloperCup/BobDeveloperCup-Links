<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BobDeveloperCup - Links</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Spicy+Rice&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1a1a;
            background-image: 
                linear-gradient(45deg, #151515 25%, transparent 25%, transparent 75%, #151515 75%, #151515),
                linear-gradient(45deg, #151515 25%, #1a1a1a 25%, #1a1a1a 75%, #151515 75%, #151515);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            color: #ffffff;
            font-family: 'Spicy Rice', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow-x: hidden;
            animation: moverListras 3s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 1;
        }

        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
            animation: graoFilme 0.3s steps(4) infinite;
        }

        @keyframes moverListras {
            0% { background-position: 0 0, 30px 30px; }
            100% { background-position: 60px 60px, 90px 90px; }
        }

        @keyframes graoFilme {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            20% { transform: translate(-2%, 1%); }
            30% { transform: translate(1%, -2%); }
            40% { transform: translate(-1%, 3%); }
            50% { transform: translate(-2%, 1%); }
            60% { transform: translate(1%, 2%); }
            70% { transform: translate(3%, -2%); }
            80% { transform: translate(-1%, 1%); }
            90% { transform: translate(2%, -1%); }
            100% { transform: translate(1%, 1%); }
        }

        .main-layout {
            display: flex;
            flex: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
            gap: 40px;
            align-items: center;
            position: relative;
            z-index: 2;
            transform-origin: center center;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, opacity;
        }

        .main-layout.scaled-out {
            opacity: 0;
            transform: scale(0.9) translateY(-20px);
            pointer-events: none;
        }

        .profile-panel {
            flex: 1;
            background-color: #0b0b0b;
            border: 6px solid #ffffff;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            box-shadow: 0px 12px 0px #000000;
            width: 100%;
        }

        .profile-panel::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            pointer-events: none;
            border-radius: 6px;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .header {
            margin-bottom: 25px;
            position: relative;
            width: 100%;
            overflow: visible;
        }

        .header h1 {
            font-family: 'Bangers', cursive, sans-serif;
            font-size: clamp(2rem, 8vw, 3.4rem);
            color: #ffffff;
            line-height: 1.0;
            text-shadow: 4px 4px 0px #000000;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header h1:hover {
            transform: scale(1.08);
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 340px;
            position: relative;
            z-index: 2;
        }

        .card-link {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 12px 20px;
            border: 5px solid #000000;
            border-radius: 8px;
            box-shadow: 0px 6px 0px #000000;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s ease, background-color 0.15s ease, color 0.15s ease;
        }

        .card-link i {
            font-size: 1.8rem;
            width: 45px;
            text-align: center;
            margin-right: 12px;
            color: #000000;
            transition: color 0.15s ease;
        }

        .card-link span {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (hover: hover) {
            .card-link:hover {
                transform: translateY(-4px) scale(1.02);
                box-shadow: 0px 10px 0px #ffffff, 0px 10px 20px rgba(255, 255, 255, 0.2);
                background-color: #000000;
                color: #ffffff;
                border-color: #ffffff;
            }
            .card-link:hover i {
                color: #ffffff;
            }
        }

        .card-link:active {
            transform: translateY(4px);
            box-shadow: 0px 2px 0px #000000;
        }

        .showcase-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 2;
        }

        .game-showcase {
            display: block;
            text-decoration: none;
            color: #ffffff;
            border: 6px solid #ffffff;
            border-radius: 8px;
            background-color: #000000;
            box-shadow: 0px 10px 0px #000000;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s ease;
        }

        @media (hover: hover) {
            .game-showcase:hover {
                transform: translateY(-6px) rotate(-1.5deg) scale(1.01);
                box-shadow: 0px 16px 0px #ffffff;
            }
            .game-showcase:hover img {
                filter: grayscale(100%) contrast(140%) brightness(110%);
            }
        }

        .game-showcase:active {
            transform: translateY(4px);
            box-shadow: 0px 4px 0px #000000;
        }

        .game-showcase img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) contrast(130%) brightness(90%);
            border-bottom: 6px solid #ffffff;
            transition: filter 0.2s ease;
        }

        .game-info {
            padding: 16px;
            background-color: #0b0b0b;
        }

        .game-title {
            font-size: 1.8rem;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .platform-badge {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 4px 12px;
            font-size: 0.95rem;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 2px solid #000000;
            letter-spacing: 1px;
            box-shadow: 2px 2px 0px #000000;
        }

        .credits {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #aaaaaa;
            text-transform: uppercase;
            border-top: 2px dashed #222222;
            padding-top: 10px;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .footer {
            background-color: #0b0b0b;
            border-top: 2px solid #222222;
            padding: 18px;
            text-align: center;
            font-size: 1rem;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .hidden {
            display: none !important;
        }

        .custom-details-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            opacity: 0;
            transform: translateY(100px) scale(0.9);
            transition: opacity 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform, opacity;
        }

        .custom-details-wrapper.active-tab {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .custom-details-panel {
            background-color: #0b0b0b;
            border: 6px solid #ffffff;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0px 16px 0px #000000;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 40px;
        }

        .custom-details-panel::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            pointer-events: none;
            border-radius: 6px;
        }

        .btn-back-custom {
            align-self: flex-start;
            display: flex;
            align-items: center;
            background-color: #ffffff;
            color: #000000;
            border: 4px solid #000000;
            border-radius: 6px;
            padding: 8px 16px;
            font-family: 'Spicy Rice', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0px 4px 0px #000000;
            position: relative;
            z-index: 5;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease, color 0.15s ease;
        }

        .btn-back-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0px 6px 0px #ffffff;
            background-color: #000000;
            color: #ffffff;
            border-color: #ffffff;
        }

        .btn-back-custom:active {
            transform: translateY(2px);
            box-shadow: 0px 2px 0px #000000;
        }

        .custom-game-title {
            font-family: 'Bangers', sans-serif;
            font-size: clamp(2.5rem, 6vw, 3.8rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 4px 4px 0px #000000;
            margin-top: -10px;
            position: relative;
            z-index: 5;
        }

        .custom-carousel {
            position: relative;
            width: 100%;
            height: 420px;
            border: 6px solid #ffffff;
            border-radius: 8px;
            box-shadow: 0px 8px 0px #000000;
            overflow: hidden;
            background-color: #000000;
            z-index: 5;
        }

        .custom-carousel-images {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .custom-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            filter: grayscale(100%) contrast(130%) brightness(90%);
        }

        .custom-slide.active {
            opacity: 1;
            position: relative;
        }

        .custom-carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: #ffffff;
            color: #000000;
            border: 4px solid #000000;
            border-radius: 6px;
            font-size: 1.6rem;
            padding: 6px 16px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0px 4px 0px #000000;
            font-family: 'Bangers', sans-serif;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease, color 0.15s ease;
        }

        .custom-carousel-btn:hover {
            background-color: #000000;
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0px 4px 0px #ffffff;
        }

        .custom-carousel-btn:active {
            transform: translateY(-50%) translateY(2px);
            box-shadow: 0px 2px 0px #000000;
        }

        .custom-prev { left: 20px; }
        .custom-next { right: 20px; }

        .custom-description {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-top: 4px dashed #222222;
            padding-top: 20px;
            position: relative;
            z-index: 5;
        }

        .custom-actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            position: relative;
            z-index: 5;
            margin-top: 5px;
        }

        .btn-custom-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 16px 20px;
            border: 5px solid #000000;
            border-radius: 8px;
            box-shadow: 0px 6px 0px #000000;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.15s ease, background-color 0.15s ease, color 0.15s ease;
        }

        .btn-custom-action:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0px 10px 0px #ffffff;
            background-color: #000000;
            color: #ffffff;
            border-color: #ffffff;
        }

        .btn-custom-action:active {
            transform: translateY(4px);
            box-shadow: 0px 2px 0px #000000;
        }

        @media (max-width: 950px) {
            .main-layout {
                flex-direction: column;
                padding: 30px 15px;
                gap: 25px;
                align-items: center;
            }
            .profile-panel {
                padding: 30px 20px;
                max-width: 460px;
            }
            .card-link span {
                font-size: 1.3rem;
            }
            .game-title {
                font-size: 1.6rem;
            }
            .game-showcase img {
                height: 130px;
            }
            .custom-carousel {
                height: 260px;
            }
            .custom-actions-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="main-layout" id="origin-layout">
        <section class="profile-panel">
            <header class="header">
                <h1>BOBDEVELOPERCUP</h1>
            </header>

            <nav class="links-list">
                <a href="https://www.youtube.com/@BobDevelopercup" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Canal do YouTube">
                    <i class="fab fa-youtube" aria-hidden="true"></i>
                    <span>YouTube</span>
                </a>

                <a href="https://discord.com/invite/SHhxwhBCjw" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Servidor do Discord">
                    <i class="fab fa-discord" aria-hidden="true"></i>
                    <span>Discord</span>
                </a>

                <a href="https://bob-developer.itch.io/" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Itch.io">
                    <i class="fab fa-itch-io" aria-hidden="true"></i>
                    <span>Itch.io</span>
                </a>

                <a href="https://www.tiktok.com/@bobdevelopercup" target="_blank" rel="noopener" class="card-link" aria-label="Acessar Perfil do TikTok">
                    <i class="fab fa-tiktok" aria-hidden="true"></i>
                    <span>TikTok</span>
                </a>
            </nav>
        </section>

        <main class="right-panel">
            <section class="showcase-container" id="games-container"></section>
        </main>
    </div>

    <div class="custom-details-wrapper hidden" id="details-layout">
        <article class="custom-details-panel" id="details-content-panel"></article>
    </div>

    <footer class="footer">
        &copy; 2026 BobDeveloperCup
    </footer>

    <script>
        const GAMES_DATA = [
            {
                id: "cuphead-b2b",
                title: "Cuphead B2B",
                badge: "Compatibilidade: Mobile / PC",
                banner: "CupheadB2B_Banner.png",
                images: ["CupheadB2B_Banner.png", "CupheadB2B_Banner2.png", "CupheadB2B_Banner3.png"],
                description: "CupheadB2B foi criado por BobDeveloperCup e é inspirado em Cuphead Expansion. O projeto permite a criação de bosses originais, feitos tanto pela equipe quanto pela comunidade. Os controles e visuais foram desenvolvidos em conjunto entre a equipe e os membros da comunidade.",
                actionText: "Download APK",
                downloadUrl: "https://www.mediafire.com/file/8smcrnx9mkrf6o1/CupheadB2B_1.0.4.apk/file",
                discordUrl: "https://discord.com/invite/SHhxwhBCjw"
            },
            {
                id: "brothers-in-arms",
                title: "Brothers In Arms",
                badge: "Compatiblidade: PC | Cancelado",
                banner: "BrohtersInarms_Banner.png",
                images: ["BrohtersInarms_Banner.png"],
                description: "*Cuphead: Brothers in Arms* é uma fangame gratuita inspirada na animação musical de DAGames. Sem fins lucrativos.",
                credits: "Todos os sprites da primeira fase são do GabeDeveloper!",
                actionText: "Jogar no Navegador",
                downloadUrl: "https://bob-developer.itch.io/brothers-in-arms-bob",
                discordUrl: "https://discord.com/invite/SHhxwhBCjw"
            }
        ];

        let currentSlide = 0;

        function renderGames() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';

            GAMES_DATA.forEach(game => {
                const creditsHtml = game.credits ? `<p class="credits">${game.credits}</p>` : '';
                const card = document.createElement('div');
                card.className = 'game-showcase';
                card.setAttribute('aria-label', `Ver detalhes do jogo ${game.title}`);
                card.onclick = () => openDetailsTab(game.id);

                card.innerHTML = `
                    <img src="${game.banner}" alt="Banner do jogo ${game.title}" loading="lazy">
                    <div class="game-info">
                        <h2 class="game-title">${game.title}</h2>
                        <span class="platform-badge">${game.badge}</span>
                        ${creditsHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openDetailsTab(gameId) {
            const game = GAMES_DATA.find(g => g.id === gameId);
            if (!game) return;

            const originLayout = document.getElementById('origin-layout');
            const detailsLayout = document.getElementById('details-layout');
            const contentPanel = document.getElementById('details-content-panel');

            currentSlide = 0;

            const slidesHtml = game.images.map((img, index) => 
                `<img class="custom-slide ${index === 0 ? 'active' : ''}" src="${img}" alt="Screenshot ${index + 1}">`
            ).join('');

            const actionIcon = game.actionText.includes("Jogar") ? "fas fa-gamepad" : "fas fa-download";

            contentPanel.innerHTML = `
                <button class="btn-back-custom" onclick="closeDetailsTab()">← Voltar</button>
                <h1 class="custom-game-title">${game.title}</h1>
                <div class="custom-carousel">
                    <button class="custom-carousel-btn custom-prev" onclick="moveSlide(-1)">&#10094;</button>
                    <div class="custom-carousel-images">${slidesHtml}</div>
                    <button class="custom-carousel-btn custom-next" onclick="moveSlide(1)">&#10095;</button>
                </div>
                <p class="custom-description">${game.description}</p>
                <div class="custom-actions-grid">
                    <a href="${game.downloadUrl}" target="_blank" rel="noopener" class="btn-custom-action">
                        <i class="${actionIcon}"></i> ${game.actionText}
                    </a>
                    <a href="${game.discordUrl}" target="_blank" rel="noopener" class="btn-custom-action">
                        <i class="fab fa-discord"></i> Discord Oficial
                    </a>
                </div>
            `;

            originLayout.classList.add('scaled-out');
            detailsLayout.classList.remove('hidden');
            
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    detailsLayout.classList.add('active-tab');
                });
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeDetailsTab() {
            const originLayout = document.getElementById('origin-layout');
            const detailsLayout = document.getElementById('details-layout');

            detailsLayout.classList.remove('active-tab');
            
            setTimeout(() => {
                detailsLayout.classList.add('hidden');
                originLayout.classList.remove('scaled-out');
            }, 600);
        }

        function moveSlide(direction) {
            const slides = document.querySelectorAll('.custom-slide');
            if (slides.length === 0) return;

            slides[currentSlide].classList.remove('active');
            currentSlide += direction;
            
            if (currentSlide >= slides.length) {
                currentSlide = 0;
            } else if (currentSlide < 0) {
                currentSlide = slides.length - 1;
            }
            
            slides[currentSlide].classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', renderGames);
    </script>
</body>
</html>
